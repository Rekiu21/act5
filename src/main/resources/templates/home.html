<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/CSS/style.css}">
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">&#10003;</span>
                <span class="logo-text">TaskFlow</span>
            </div>
            <div class="header-stats">
                <span th:text="${items.size()} + ' tareas activas'">0 tareas activas</span>
            </div>
        </div>
    </header>

    <!-- Toast: Éxito -->
    <div th:if="${success}" class="toast toast-success">
        <span class="toast-icon">&#10003;</span>
        <span th:text="${success}"></span>
    </div>

    <!-- Toast: Error -->
    <div th:if="${error}" class="toast toast-error">
        <span class="toast-icon toast-icon-error">&#33;</span>
        <span th:text="${error}"></span>
    </div>

    <main>
        <div class="layout">

            <!-- Formulario nueva tarea -->
            <div class="card form-card">
                <div class="card-header">
                    <div>
                        <h2>Nueva Tarea</h2>
                        <p>Agrega una tarea a tu lista</p>
                    </div>
                </div>
                <form th:action="@{/agregar}" th:object="${item}" method="post">
                    <div class="field-group" th:classappend="${#fields.hasErrors('nombre')} ? 'has-error' : ''">
                        <label for="nombre">Nombre de la tarea</label>
                        <input type="text"
                               id="nombre"
                               th:field="*{nombre}"
                               placeholder="Ej: Revisar documentación..."
                               minlength="2"
                               maxlength="100"
                               autocomplete="off">
                        <span class="field-error"
                              th:if="${#fields.hasErrors('nombre')}"
                              th:errors="*{nombre}"></span>
                    </div>
                    <button type="submit" class="btn-primary">Agregar tarea</button>
                </form>
            </div>

            <!-- Lista de tareas -->
            <div class="card list-card">
                <div class="card-header">
                    <div>
                        <h2>Lista de Tareas</h2>
                        <p>Todas las tareas registradas</p>
                    </div>
                    <span class="badge" th:text="${items.size()}">0</span>
                </div>

                <div th:if="${#lists.isEmpty(items)}" class="empty-state">
                    <h3>Sin tareas aún</h3>
                    <p>Agrega tu primera tarea usando el formulario de la izquierda.</p>
                </div>

                <ul th:unless="${#lists.isEmpty(items)}" class="task-list">
                    <li th:each="i : ${items}" class="task-item">
                        <span class="task-id" th:text="'#' + ${i.id}"></span>
                        <span class="task-name" th:text="${i.nombre}"></span>
                        <span class="task-status">Activo</span>
                        <div class="task-actions">
                            <button class="btn-icon btn-edit"
                                    th:attr="data-id=${i.id},data-nombre=${i.nombre}"
                                    onclick="openEdit(this)"
                                    title="Editar tarea">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                            </button>
                            <button class="btn-icon btn-delete"
                                    th:attr="data-id=${i.id},data-nombre=${i.nombre}"
                                    onclick="openDelete(this)"
                                    title="Eliminar tarea">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                    <path d="M10 11v6M14 11v6"/>
                                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                                </svg>
                            </button>
                        </div>
                    </li>
                </ul>
            </div>

        </div>
    </main>

    <!-- Modal: Editar tarea -->
    <div class="modal-overlay" id="editModal" onclick="handleOverlayClick(event,'editModal')">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
            <div class="modal-header">
                <h3 id="editModalTitle">Editar tarea</h3>
                <button class="modal-close" onclick="closeModal('editModal')" aria-label="Cerrar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="editForm" method="post">
                <div class="modal-body">
                    <div class="field-group" id="editFieldGroup">
                        <label for="editNombre">Nombre de la tarea</label>
                        <input type="text"
                               id="editNombre"
                               name="nombre"
                               minlength="2"
                               maxlength="100"
                               required
                               autocomplete="off">
                        <span class="field-error" id="editError" style="display:none"></span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('editModal')">Cancelar</button>
                    <button type="submit" class="btn-primary btn-modal-submit">Guardar cambios</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Confirmar eliminación -->
    <div class="modal-overlay" id="deleteModal" onclick="handleOverlayClick(event,'deleteModal')">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
            <div class="modal-body modal-body-center">
                <div class="modal-danger-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                        <path d="M10 11v6M14 11v6"/>
                        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                    </svg>
                </div>
                <h3 id="deleteModalTitle">¿Eliminar tarea?</h3>
                <p id="deleteMsg" class="modal-desc"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeModal('deleteModal')">Cancelar</button>
                <form id="deleteForm" method="post" style="margin:0">
                    <button type="submit" class="btn-danger">Sí, eliminar</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function openEdit(btn) {
            var id = btn.dataset.id;
            var nombre = btn.dataset.nombre;
            document.getElementById('editForm').action = '/editar/' + id;
            document.getElementById('editNombre').value = nombre;
            document.getElementById('editError').style.display = 'none';
            document.getElementById('editFieldGroup').classList.remove('has-error');
            openModal('editModal');
            setTimeout(function() { document.getElementById('editNombre').focus(); }, 150);
        }

        function openDelete(btn) {
            var id = btn.dataset.id;
            var nombre = btn.dataset.nombre;
            document.getElementById('deleteForm').action = '/eliminar/' + id;
            document.getElementById('deleteMsg').textContent =
                'Se eliminará "' + nombre + '". Esta acción no se puede deshacer.';
            openModal('deleteModal');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('open');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }

        function handleOverlayClick(event, modalId) {
            if (event.target === event.currentTarget) closeModal(modalId);
        }

        document.getElementById('editForm').addEventListener('submit', function(e) {
            var input = document.getElementById('editNombre');
            var errorEl = document.getElementById('editError');
            var fieldGroup = document.getElementById('editFieldGroup');
            var val = input.value.trim();
            if (val.length < 2 || val.length > 100) {
                e.preventDefault();
                errorEl.textContent = 'Debe tener entre 2 y 100 caracteres.';
                errorEl.style.display = 'block';
                fieldGroup.classList.add('has-error');
                input.focus();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.open').forEach(function(m) {
                    closeModal(m.id);
                });
            }
        });
    </script>

</body>
</html>
